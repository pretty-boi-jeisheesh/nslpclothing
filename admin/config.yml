backend:
  name: git-gateway
  branch: main   # change this to "master" if that's your repo's default branch

# Where uploaded photos get stored, and how the site links to them
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Shop Products"
    files:
      - name: "products"
        label: "Products"
        file: "data/products.json"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{fields.name}} — ₱{{fields.price}}"
            fields:
              - label: "ID"
                name: "id"
                widget: "number"
                value_type: "int"
                hint: "Must be a unique number — don't reuse an existing product's ID"
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Price (₱)", name: "price", widget: "number"}
              - {label: "Default Photo", name: "image", widget: "image", required: false}
              - label: "Color / Style Variants"
                name: "variants"
                widget: "list"
                required: false
                summary: "{{fields.label}}"
                hint: "Add one entry per color or style. Leave empty if this product has no variants."
                fields:
                  - {label: "Variant Name (e.g. Black, Olive, Cream)", name: "label", widget: "string"}
                  - {label: "Swatch Color", name: "color", widget: "color", required: false, hint: "The little colored dot shown on the site"}
                  - {label: "Photo for this variant", name: "image", widget: "image", required: false, hint: "Leave blank to use the Default Photo above"}

  - name: "settings"
    label: "Payment Details"
    files:
      - name: "payment"
        label: "Payment Accounts"
        file: "data/payment.json"
        fields:
          - {label: "GCash Account Name", name: "gcash_name", widget: "string"}
          - {label: "GCash Number", name: "gcash_number", widget: "string"}
          - {label: "Maya Account Name", name: "maya_name", widget: "string"}
          - {label: "Maya Number", name: "maya_number", widget: "string"}
          - {label: "GoTyme Account Name", name: "gotyme_name", widget: "string"}
          - {label: "GoTyme Number", name: "gotyme_number", widget: "string"}
